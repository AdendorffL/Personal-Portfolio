<svg xmlns="http://www.w3.org/2000/svg" viewBox="-450 -450 900 900">

<!-- Crescent Masks -->
<defs>
    <mask id="crescent-mask">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="10" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask2">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="20" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask3">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="30" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask4">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="40" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask5">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="50" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask6">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="35" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask7">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="25" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask8">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="15" cy="0" r="36" fill="black"/>
    </mask>
    <mask id="crescent-mask9">
        <circle cx="0" cy="0" r="36" fill="white"/>
        <circle cx="5" cy="0" r="36" fill="black"/>
    </mask>

    <!-- Big Moon Mask -->
    <mask id="big-moon-mask">
        <circle cx="0" cy="0" r="210" fill="white"/>
        <circle cx="45" cy="0" r="170" fill="black"/>
    </mask>
    <!-- Middle Moon Mask -->
     <mask id="middle-moon-mask">
        <circle cx="0" cy="0" r="160" fill="white"/>
        <circle cx="27" cy="0" r="125" fill="black"/>
    </mask>

</defs>

<g style="will-change: transform; backface-visibility: hidden;">
    <animateTransform attributeName="transform"
        type="rotate"
        from="0" to="360"
        dur="120"
        repeatCount="indefinite"/>

    <!-- Outer circle with spikes -->
    <circle r="415" fill="none" stroke="#5b5e67" stroke-width="0.5" stroke-dasharray="638,14" stroke-dashoffset="-7"/>
   <polygon points="0,-7 -10,0 0,7 10,0" fill="none" 
        stroke="#5b5e67" stroke-width="0.5" transform="rotate(0) translate(415)"/>
    <polygon points="0,-7 -10,0 0,7 10,0" fill="none" 
        stroke="#5b5e67" stroke-width="0.5" transform="rotate(90) translate(415)"/>
    <polygon points="0,-7 -10,0 0,7 10,0" fill="none" 
        stroke="#5b5e67" stroke-width="0.5" transform="rotate(180) translate(415)"/>
    <polygon points="0,-7 -10,0 0,7 10,0" fill="none" 
        stroke="#5b5e67" stroke-width="0.5" transform="rotate(270) translate(415)"/>
</g>

<g style="will-change: transform; backface-visibility: hidden;">
    <animateTransform attributeName="transform"
        type="rotate"
        from="360" to="0"
        dur="120"
        repeatCount="indefinite"/>
    
    <!-- Outer circle with stars -->
    <circle r="400" fill="none" stroke="#5b5e67" stroke-width="1"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(0) translate(400)"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(60) translate(400)"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(120) translate(400)"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(180) translate(400)"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(240) translate(400)"/>
    <path d="M 0 -16
         Q 4 -4  18 0
         Q 4 4   0 16
         Q -4 4  -18 0
         Q -4 -4 0 -16
         Z"
      fill="#5b5e67" stroke="#5b5e67" stroke-width="1" transform="rotate(300) translate(400)"/>
</g>

<g style="will-change: transform; backface-visibility: hidden;">
    <animateTransform attributeName="transform"
        type="rotate"
        from="0" to="360"
        dur="120"
        repeatCount="indefinite"/>
    
    <!-- Middle circle dashed -->
    <circle r="330" fill="none" stroke="#5b5e67" stroke-width="3"
            stroke-dasharray="2,5"/>
</g>

<g style="will-change: transform; backface-visibility: hidden;">
    <animateTransform attributeName="transform"
        type="rotate"
        from="360" to="0"
        dur="80s"
        repeatCount="indefinite"/>

    <!-- Middle moon circles -->
    <circle r="310" fill="none" stroke="#8a898a" stroke-width="3" stroke-dasharray="80 82.3" stroke-dashoffset="-41" />
    <!-- outer rings of moon circles -->
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(0)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(30)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(60)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(90)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(120)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(150)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(180)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(210)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(240)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(270)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(300)translate(310,0)"/>
    <circle r="40" fill="none" stroke="#8a898a" stroke-width="3" transform="rotate(330)translate(310,0)"/>

    <!-- Inner moon circles -->
    <circle r="36" fill="#323a55" transform="rotate(0)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(30)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(60)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(90)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(120)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(150)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(180)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(210)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(240)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(270)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(300)translate(310,0)"/>
    <circle r="36" fill="#323a55" transform="rotate(330)translate(310,0)"/>

    <!-- Moon cycle moons -->
    
    <g transform="translate(310, 0) rotate(270)">
    <circle cx="0" cy="0" r="36" fill="#6669b6" mask="url(#crescent-mask)"/>
    </g>
    <g transform="rotate(30) translate(310, 0) rotate(270)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask2)" />
    </g>
    <g transform="rotate(60) translate(310, 0) rotate(270)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask3)" />
    </g>
    <g transform="rotate(90) translate(310, 0) rotate(270)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask4)" />
    </g>
    <g transform="rotate(120) translate(310, 0) rotate(90)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask5)" />
    </g>
    <g transform="rotate(150) translate(310, 0) rotate(90)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask6)" />
    </g>
    <g transform="rotate(180) translate(310, 0) rotate(90)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask7)" />
    </g>
    <g transform="rotate(210) translate(310, 0) rotate(90)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask8)" />
    </g>
    <g transform="rotate(240) translate(310, 0) rotate(90)">
    <circle r="36" fill="#6669b6" mask="url(#crescent-mask9)" />
    </g>
</g>

<g style="will-change: transform; backface-visibility: hidden;">
    <animateTransform attributeName="transform"
        type="rotate"
        from="0" to="360"
        dur="100s"
        repeatCount="indefinite"/>

    <!-- Inner main circle and moon -->
    <circle r="220" fill="none" stroke="#8d9aba" stroke-width="1.5"/>
    <g>
    <circle r="210" fill="#8ca3dc" mask="url(#big-moon-mask)"/>
    </g>
    <g transform="translate(44, 0) rotate(180)">
    <circle r="150" fill="#6170a1" mask="url(#middle-moon-mask)"/>
    </g>
    <g transform="translate(-10, 0)">
    <circle r="80" fill="#667ba3" mask="url(#small-moon-mask)"/>
    </g>
</g>
</svg>