<svg xmlns="http://www.w3.org/2000/svg" viewBox="-450 -450 900 900">

<!-- Centre -->
    <circle r="70" fill="none" stroke="#ffffff" stroke-width="2"/>

<!-- Outer Orbit rotating arms -->
    <g>
        <animateTransform attributeName="transform"
            type="rotate"
            from="0" to="360"
            dur="40s"
            repeatCount="indefinite"/>
        <circle r="400" fill="none" stroke="#40a6e0" stroke-width="2"
                stroke-dasharray="64,64" />
        <line x1="-400" y1="0" x2="400" y2="0"
              stroke="#ffffff" stroke-width="2"/>
        <line x1="0" y1="0" x2="0" y2="400"
                stroke="#ffffff" stroke-width="2"/>
        <circle r="6" fill="#fff" cy="-400"/>
    </g>

<!-- Orbit with rotating arm with circles on ends -->
    <g>
        <animateTransform attributeName="transform"
            type="rotate"
            from="360" to="0"
            dur="35s"
            repeatCount="indefinite"/>
        <circle r="360" fill="none" stroke="#40a6e0" stroke-width="2"
                stroke-dasharray="32,32"/>
        <circle r="170" fill="none" stroke="#40a6e0" stroke-width="2" 
                stroke-dasharray="4,4" cx="-25" cy="5"/>
        <line x1="-360" y1="0" x2="360" y2="0"
              stroke="#ffffff" stroke-width="2"/>
        <circle r="45" fill="none" stroke="#fff" stroke-width="2" cx="-90" cy="-150"/>
        <circle r="15" fill="none" stroke="#fff" stroke-width="2" cx="360" cy="0"/>
        <circle r="15" fill="none" stroke="#fff" stroke-width="2" cx="-360" cy="0"/>
        <circle r="60" fill="none" stroke="#fff" stroke-width="2" cx="360" cy="60"/>
        <circle r="60" fill="none" stroke="#fff" stroke-width="2" cx="360" cy="60"/>
        <circle r="60" fill="none" stroke="#fff" stroke-width="2" cx="-360" cy="-60"/>
        <circle r="7" fill="#fff" cy="-360"/>
    </g>

    <!-- Middle orbit with dots -->
    <g>
        <animateTransform attributeName="transform"
            type="rotate"
            from="360" to="0"
            dur="30s"
            repeatCount="indefinite"/>
        <circle r="320" fill="none" stroke="#40a6e0" stroke-width="2"
                stroke-dasharray="16,16"/>
        <circle r="6" fill="#ffff" cx="320"/>
        <circle r="10" fill="#ffff" cx="319" cy="22"/>
        <circle r="6" fill="#ffff" cx="-320"/>
        <circle r="10" fill="#ffff" cx="-319" cy="-22"/>
        <circle r="12" fill="none" stroke="#fff" stroke-width="2" cy="265"/>
        <circle r="20" fill="none" stroke="#fff" stroke-width="2" cx="-60" cy="100"/>
        <circle r="4" fill="none" stroke="#fff" stroke-width="2" cx="-60" cy="100"/>
        <line x1="-59" x2="-3" y1="104" y2="253"
              stroke="#ffffff" stroke-width="2"/>
        <path d="M 0 265  A 265 265 0 0 0 250 200" fill="none" 
                stroke="#40a6e0" stroke-width="2" stroke-dasharray="16,16" />

    </g>

    <!-- Inner orbit with linked circles-->
    <g>
        <animateTransform attributeName="transform"
            type="rotate"
            from="0" to="360"
            dur="25s"
            repeatCount="indefinite"/>
        <circle r="265" fill="none" stroke="#40a6e0" stroke-width="2"
                stroke-dasharray="8,8"/>
        <circle r="4" fill="#ffff" cx="265"/>
        <circle r="12" fill="none" stroke="#ffff" stroke-width="2" cx="265"/>
        <circle r="8" fill="#ffff" cx="198" cy="-80"/>
        <circle r="40" fill="none" stroke="#ffff" stroke-width="2" cx="198" cy="-80"/>
        <line x1="265" x2="198" y1="0" y2="-80"
              stroke="#ffffff" stroke-width="2"/>
    </g>

</svg>